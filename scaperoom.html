<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Europa Scape</title>
  <!-- Recursos externos propios -->
  <link rel="stylesheet" href="./style/scaperoom.css" />
  <script src="./js/scaperoom.js" defer></script>
</head>

<body>
  <main class="escena" id="principal">
    <!--Aquí van los diferentes elementos donde hacer click -->
    <!--Aún no he cambiado nada de JS y los métodos los dejo igual -->


    <!--Escena 1, clase-->
    <div class="pizarra" id="pizarra" onclick="pizarra()"></div>
    <div class="papel" id="papel" onclick="papel()"></div>
    <div class="corcho" id="corcho" onclick="corcho()"></div>
    <div class="llave" id="llave" onclick="pasillo()"></div>

    <!--Escena 2,pasillo-->
    <div class="puerta1" id="puerta1" onclick="puertaCerrada()"></div>
    <div class="puerta2" id="puerta2" onclick="puertaCerrada()"></div>
    <div class="flecha1" id="flecha1" onclick="pasilloMini()"></div>
    <div class="puertaBanio" id="puertaBanio" onclick="necesitoLlave()"></div>
    <div class="flechaClase" id="flechaClase" onclick="inicio()"></div>

    <!--Escena 3, mini pasillo-->
    <div class="puertaIT" id="puertaIT" onclick="pasarIT()"></div>
    <div class="ventanaIT" id="ventanaIT" onclick="verVentanaIT()"></div>
    <div class="flecha2" id="flecha2" onclick="pasillo()"></div>


    <!--Escena 4, dpto it -->
    <div class="llaveBanio" id="llaveBanio" onclick="cogerLlave()"></div>
    <div class="flecha3" id="flecha3" onclick="pasilloMini()"></div>
    <div class="barra" id="barra" onclick="cogerBarra()"></div>
    <div id="inventario">
      <div class="slot" id="slot1"></div>
      <div class="slot" id="slot2"></div>
    </div>

    <!--Escena 5, pasillo de nuevo  -->


    <!--Escena 6, Baño  -->
    <div class="puertaBanioAbierta" id="puertaBanioAbierta" onclick="banioAbierto()"></div>
    <div class="ventana" id="ventana" onclick="salida()"></div>
    <div class="flecha4" id="flecha4" onclick="pasillo()"></div>
    <div class="ventanaBanio" id="ventanaBanio" onclick="ventanaCerrada()"></div>
    <div class="puertaBanio1" id="puertaBanio1" onclick=" puertaCerrada()"></div>
    <div class="puertaBanio2" id="puertaBanio2" onclick=" puertaCerrada()"></div>

    <!--Escena 7, patio  -->

    <div class="candado" id="candado" onclick="mostrarCodigo()"></div>
    <div class="flecha5" id="flecha5" onclick="EscenaBanio()"></div>

    <div id="panelCodigo">
      <p>Introduce el código:</p>
      <span id="intentosTexto">(3 intentos)</span><br>
      <input type="text" id="inputCodigo" placeholder="000" maxlength="3" />
      <button onclick="comprobarCodigo()">Abrir</button>
      <button onclick="cerrarPanel()">Cancelar</button>
      <p id="mensajeCodigo"></p>
    </div>

  </main>



  <main id="pizarraGrande" onclick="noPizarra()">
  </main>

  <main id="papelGrande" onclick="noPapel()">
  </main>

  </main>
